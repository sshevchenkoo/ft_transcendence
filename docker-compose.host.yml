# Full-stack single-host deploy (e.g. a DigitalOcean droplet): db + redis + api
# + web, brought up with one command. Only `web` is published; it proxies the
# API paths to `api` over the internal network, so db/redis/api are never
# exposed to the internet.
#
#   docker compose -f docker-compose.host.yml up -d --build
#
# Put secrets in backend/.env (ANTHROPIC_API_KEY, VOYAGE_API_KEY, APIFY_TOKEN,
# TICKETMASTER_API_KEY, GOOGLE_CLIENT_ID/SECRET, SESSION_SECRET) and optionally a
# repo-root .env with FRONTEND_URL / POSTGRES_PASSWORD for the values below.
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: events
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d events"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  api:
    build: ./backend
    # API keys come from backend/.env; the rest is wired for the compose network.
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg://app:${POSTGRES_PASSWORD:-app}@db:5432/events
      REDIS_URL: redis://redis:6379/0
      # Public URL of the site (OAuth redirect + post-login). Set in repo-root .env.
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      SESSION_HTTPS_ONLY: ${SESSION_HTTPS_ONLY:-false}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  web:
    # The Next server proxies /search,/auth,/me,/upcoming,/items to the API.
    # Rewrites are baked at build time, so the upstream is a build arg.
    build:
      context: ./frontend
      args:
        BACKEND_INTERNAL_URL: http://api:8000
    depends_on:
      - api
    ports:
      - "80:3000"
    restart: unless-stopped

volumes:
  pgdata:
