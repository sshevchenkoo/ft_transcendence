# Helm values for the fluent/fluent-bit chart. Ships every container's logs to the
# ELK droplet's Logstash TCP json_lines input (port 5000), which matches
# infrastructure/ansible/roles/elk/templates/logstash.conf.j2.
#
#   ELK_PRIVATE_IP=<from terraform output> envsubst < platform/fluent-bit-values.yaml \
#     | helm upgrade --install fluent-bit fluent/fluent-bit -n logging --create-namespace -f -
config:
  inputs: |
    [INPUT]
        Name              tail
        Path              /var/log/containers/*.log
        multiline.parser  docker, cri
        Tag               kube.*
        Mem_Buf_Limit     10MB
        Skip_Long_Lines   On

  filters: |
    [FILTER]
        Name                kubernetes
        Match               kube.*
        Merge_Log           On
        Keep_Log            Off
        K8S-Logging.Parser  On
        K8S-Logging.Exclude On

  outputs: |
    [OUTPUT]
        Name             tcp
        Match            *
        Host             ${ELK_PRIVATE_IP}
        Port             5000
        Format           json_lines
        json_date_key    time
        json_date_format iso8601
