# cert-manager issuer used by backend/k8s/40-ingress.yml
# (annotation cert-manager.io/cluster-issuer: letsencrypt-prod).
# Apply after installing cert-manager:  envsubst < platform/clusterissuer.yaml | kubectl apply -f -
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: ${ACME_EMAIL}
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
      - http01:
          ingress:
            class: nginx
