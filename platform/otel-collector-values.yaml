mode: deployment

# The chart no longer defaults the image. Use the contrib distribution — it
# includes the `prometheus` exporter we use (the core image does not).
image:
  repository: otel/opentelemetry-collector-contrib
command:
  name: otelcol-contrib

config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"

  processors:
    batch:
      timeout: 5s

  exporters:
    # Traces → Tempo
    otlp/tempo:
      endpoint: "tempo.monitoring:4317"
      tls:
        insecure: true

    # Metrics → expose /metrics for Prometheus to scrape
    prometheus:
      endpoint: "0.0.0.0:8889"

  service:
    pipelines:
      traces:
        receivers:  [otlp]
        processors: [batch]
        exporters:  [otlp/tempo]
      metrics:
        receivers:  [otlp]
        processors: [batch]
        exporters:  [prometheus]

service:
  type: ClusterIP

# Ports are top-level in this chart (service.ports is rejected by the schema).
# otlp (4317) + otlp-http (4318) are enabled by default; add the prometheus
# exporter port (8889) so Prometheus can scrape the collector's metrics.
ports:
  prometheus:
    enabled: true
    containerPort: 8889
    servicePort: 8889
    protocol: TCP

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi
