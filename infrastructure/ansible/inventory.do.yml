# Static inventory for the DigitalOcean ELK droplet (the rest of prod is DOKS).
# Placeholders are filled from terraform output by `make do-elk`, e.g.:
#   ELK_PUBLIC_IP=$(terraform -chdir=infrastructure/digitalocean output -raw elk_public_ip) \
#   ELK_PRIVATE_IP=$(terraform -chdir=infrastructure/digitalocean output -raw elk_private_ip) \
#   envsubst < inventory.do.yml > /tmp/inv.do.yml
#   ansible-playbook -i /tmp/inv.do.yml playbooks/elk.yml --private-key ~/.ssh/hetzner_warsaw
#
# Default inventory in ansible.cfg is Hetzner's — always pass -i for the DO one.
elk:
  hosts:
    warsaw-elk:
      ansible_host: "${ELK_PUBLIC_IP}"
      ansible_user: root
      # Logstash binds here and Fluent Bit (in the cluster) ships to it over the VPC.
      elk_private_ip: "${ELK_PRIVATE_IP}"
  vars:
    kibana_user: "kibana"
    kibana_password: "${KIBANA_PASSWORD}" # export a real one before running
