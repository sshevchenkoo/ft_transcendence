---
- name: Install Docker dependencies
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - nginx
      - apache2-utils    # provides htpasswd
    state: present
    update_cache: yes

- name: Add Docker GPG key
  shell: |
    install -m 0755 -d /etc/apt/keyrings
    curl -fsSL https://download.docker.com/linux/ubuntu/gpg | \
      gpg --dearmor -o /etc/apt/keyrings/docker.gpg
    chmod a+r /etc/apt/keyrings/docker.gpg
  args:
    creates: /etc/apt/keyrings/docker.gpg

- name: Add Docker repository
  shell: |
    echo \
      "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] \
      https://download.docker.com/linux/ubuntu \
      $(lsb_release -cs) stable" > /etc/apt/sources.list.d/docker.list
  args:
    creates: /etc/apt/sources.list.d/docker.list

- name: Install Docker Engine
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: yes

- name: Start and enable Docker
  service:
    name: docker
    state: started
    enabled: yes

- name: Set vm.max_map_count for Elasticsearch
  sysctl:
    name: vm.max_map_count
    value: "262144"
    state: present
    reload: yes

- name: Create ELK directory structure
  file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ elk_dir }}"
    - "{{ elk_dir }}/logstash/pipeline"

- name: Template docker-compose.yml
  template:
    src: docker-compose.yml.j2
    dest: "{{ elk_dir }}/docker-compose.yml"
    mode: "0644"
  notify: restart elk

- name: Template Logstash pipeline config
  template:
    src: logstash.conf.j2
    dest: "{{ elk_dir }}/logstash/pipeline/logstash.conf"
    mode: "0644"
  notify: restart elk

- name: Start ELK stack
  shell: docker compose up -d
  args:
    chdir: "{{ elk_dir }}"

- name: Wait for Elasticsearch to be healthy
  uri:
    url: "http://127.0.0.1:9200/_cluster/health"
    status_code: 200
  register: es_health
  until: es_health.status == 200 and es_health.json.status in ["green", "yellow"]
  retries: 30
  delay: 10

# ─── ILM Policy (log retention) ───────────────────────────────────────────────

- name: Create ILM retention policy ({{ elk_retention_days }} days)
  uri:
    url: "http://127.0.0.1:9200/_ilm/policy/k8s-logs-policy"
    method: PUT
    body_format: json
    body:
      policy:
        phases:
          hot:
            min_age: "0ms"
            actions: {}
          delete:
            min_age: "{{ elk_retention_days }}d"
            actions:
              delete: {}
    status_code: [200, 201]

- name: Create index template applying ILM policy to k8s-logs-* indices
  uri:
    url: "http://127.0.0.1:9200/_index_template/k8s-logs-template"
    method: PUT
    body_format: json
    body:
      index_patterns: ["k8s-logs-*"]
      template:
        settings:
          number_of_shards: 1
          number_of_replicas: 0
          index.lifecycle.name: "k8s-logs-policy"
    status_code: [200, 201]

# ─── Kibana basic auth via nginx ──────────────────────────────────────────────

- name: Create Kibana htpasswd file
  shell: >
    htpasswd -bc /etc/nginx/.kibana_htpasswd
    {{ kibana_user }} {{ kibana_password }}
  no_log: true

- name: Remove default nginx site
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: reload nginx

- name: Configure nginx as Kibana reverse proxy with basic auth
  template:
    src: nginx-kibana.conf.j2
    dest: /etc/nginx/sites-available/kibana.conf
    mode: "0644"
  notify: reload nginx

- name: Enable Kibana nginx site
  file:
    src: /etc/nginx/sites-available/kibana.conf
    dest: /etc/nginx/sites-enabled/kibana.conf
    state: link
  notify: reload nginx

- name: Start and enable nginx
  service:
    name: nginx
    state: started
    enabled: yes
