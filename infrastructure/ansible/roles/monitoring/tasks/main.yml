---
# All commands run on k3s master — KUBECONFIG is at /etc/rancher/k3s/k3s.yaml

- name: Install Helm
  shell: |
    curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
  args:
    creates: /usr/local/bin/helm
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: Add Helm repositories
  shell: |
    helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
    helm repo add grafana              https://grafana.github.io/helm-charts
    helm repo add open-telemetry       https://open-telemetry.github.io/opentelemetry-helm-charts
    helm repo add fluent               https://fluent.github.io/helm-charts
    helm repo update
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: Create monitoring namespace
  shell: kubectl create namespace monitoring --dry-run=client -o yaml | kubectl apply -f -
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: Copy kube-prometheus-stack values
  template:
    src: prometheus-stack-values.yml.j2
    dest: /tmp/prometheus-stack-values.yml

- name: Install kube-prometheus-stack (Prometheus + Grafana + AlertManager)
  shell: |
    helm upgrade --install kube-prometheus-stack prometheus-community/kube-prometheus-stack \
      --namespace monitoring \
      --values /tmp/prometheus-stack-values.yml \
      --wait --timeout 10m
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: Copy Tempo values
  template:
    src: tempo-values.yml.j2
    dest: /tmp/tempo-values.yml

- name: Install Tempo (distributed tracing backend)
  shell: |
    helm upgrade --install tempo grafana/tempo \
      --namespace monitoring \
      --values /tmp/tempo-values.yml \
      --wait --timeout 5m
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: Copy OTel Collector values
  template:
    src: otel-collector-values.yml.j2
    dest: /tmp/otel-collector-values.yml

- name: Install OpenTelemetry Collector
  shell: |
    helm upgrade --install otel-collector open-telemetry/opentelemetry-collector \
      --namespace monitoring \
      --values /tmp/otel-collector-values.yml \
      --wait --timeout 5m
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: Copy Fluent Bit values
  template:
    src: fluent-bit-values.yml.j2
    dest: /tmp/fluent-bit-values.yml

- name: Install Fluent Bit (log shipper to ELK)
  shell: |
    helm upgrade --install fluent-bit fluent/fluent-bit \
      --namespace monitoring \
      --values /tmp/fluent-bit-values.yml \
      --wait --timeout 5m
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: Apply alerting rules (PrometheusRule)
  shell: |
    cat <<'EOF' | kubectl apply -f -
    {{ lookup('template', 'alerting-rules.yml.j2') }}
    EOF
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: Apply custom Grafana dashboard ConfigMap
  shell: |
    cat <<'EOF' | kubectl apply -f -
    {{ lookup('template', 'grafana-dashboard.yml.j2') }}
    EOF
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: Add Tempo datasource to Grafana
  shell: |
    kubectl apply -f - <<'EOF'
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: grafana-datasource-tempo
      namespace: monitoring
      labels:
        grafana_datasource: "1"
    data:
      tempo-datasource.yaml: |
        apiVersion: 1
        datasources:
          - name: Tempo
            type: tempo
            url: http://tempo:3100
            access: proxy
            isDefault: false
    EOF
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
