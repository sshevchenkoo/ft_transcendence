---
# FIX: защита если k3s_workers.yml запускается отдельно без k3s_master.yml
# В этом случае читаем token напрямую с мастера по SSH
- name: Получить join token с мастера (если нет в памяти)
  slurp:
    src: /var/lib/rancher/k3s/server/node-token
  delegate_to: "{{ groups['k3s_master'][0] }}"
  register: k3s_token_fallback
  when: hostvars[groups['k3s_master'][0]]['k3s_join_token'] is not defined

- name: Установить token из fallback
  set_fact:
    k3s_join_token: "{{ k3s_token_fallback.content | b64decode | trim }}"
  when: hostvars[groups['k3s_master'][0]]['k3s_join_token'] is not defined

- name: Установить k3s worker
  shell: |
    curl -sfL https://get.k3s.io | INSTALL_K3S_VERSION="{{ k3s_version }}" sh -s - agent \
      --server https://{{ hostvars[groups['k3s_master'][0]]['ansible_host'] }}:6443 \
      --token {{ hostvars[groups['k3s_master'][0]]['k3s_join_token'] | default(k3s_join_token) }}
  args:
    creates: /usr/local/bin/k3s

- name: Дождаться подключения к мастеру
  wait_for:
    host: "{{ hostvars[groups['k3s_master'][0]]['ansible_host'] }}"
    port: 6443
    timeout: 60
