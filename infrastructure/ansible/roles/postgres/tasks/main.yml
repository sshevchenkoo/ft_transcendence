---
- name: Install PostgreSQL
  apt:
    name:
      - postgresql
      - postgresql-contrib
      - python3-psycopg2   # required by Ansible for the postgresql_* modules
    state: present
    update_cache: yes

- name: Start and enable PostgreSQL
  service:
    name: postgresql
    state: started
    enabled: yes

# FIX: detect the version dynamically instead of hardcoding "/16/"
- name: Get the PostgreSQL version
  shell: pg_lsclusters -h | awk 'NR==1{print $1}'
  register: pg_version_raw
  changed_when: false

- name: Set a fact with the version
  set_fact:
    pg_version: "{{ pg_version_raw.stdout | trim }}"

# FIX: added become: yes for the postgresql modules
- name: Create the database user
  become_user: postgres
  postgresql_user:
    name: "{{ postgres_user }}"
    password: "{{ postgres_password }}"
    state: present

- name: Create the database
  become_user: postgres
  postgresql_db:
    name: "{{ postgres_db }}"
    owner: "{{ postgres_user }}"
    state: present

- name: Allow connections from the private subnet
  lineinfile:
    path: "/etc/postgresql/{{ pg_version }}/main/pg_hba.conf"
    line: "host  {{ postgres_db }}  {{ postgres_user }}  10.0.1.0/24  scram-sha-256"
    state: present
  notify: restart postgresql

- name: Configure listen_addresses
  lineinfile:
    path: "/etc/postgresql/{{ pg_version }}/main/postgresql.conf"
    regexp: "^#?listen_addresses"
    line: "listen_addresses = 'localhost,{{ postgres_private_ip }}'"
  notify: restart postgresql
