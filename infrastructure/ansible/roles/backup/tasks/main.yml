---
- name: Create backup directory
  file:
    path: "{{ backup_dir }}"
    state: directory
    owner: postgres
    group: postgres
    mode: "0750"

- name: Install backup script
  copy:
    dest: /usr/local/bin/pg-backup.sh
    mode: "0750"
    owner: postgres
    content: |
      #!/usr/bin/env bash
      set -euo pipefail

      BACKUP_DIR="{{ backup_dir }}"
      DB="{{ postgres_db }}"
      RETENTION={{ backup_retention_days }}
      TIMESTAMP=$(date +%Y%m%d_%H%M%S)
      FILE="${BACKUP_DIR}/${DB}_${TIMESTAMP}.sql.gz"

      echo "[$(date)] Starting backup of ${DB}..."
      pg_dump -U {{ postgres_user }} "${DB}" | gzip > "${FILE}"
      echo "[$(date)] Backup saved: ${FILE} ($(du -sh ${FILE} | cut -f1))"

      # Remove backups older than retention period
      find "${BACKUP_DIR}" -name "*.sql.gz" -mtime +${RETENTION} -delete
      echo "[$(date)] Cleanup done. Current backups:"
      ls -lh "${BACKUP_DIR}"

- name: Install restore script
  copy:
    dest: /usr/local/bin/pg-restore.sh
    mode: "0750"
    owner: postgres
    content: |
      #!/usr/bin/env bash
      set -euo pipefail

      BACKUP_FILE="${1:-}"
      DB="{{ postgres_db }}"
      USER="{{ postgres_user }}"

      if [ -z "${BACKUP_FILE}" ]; then
        echo "Usage: pg-restore.sh <backup_file.sql.gz>"
        echo ""
        echo "Available backups:"
        ls -lh {{ backup_dir }}/*.sql.gz 2>/dev/null || echo "  No backups found"
        exit 1
      fi

      if [ ! -f "${BACKUP_FILE}" ]; then
        echo "Error: file not found: ${BACKUP_FILE}"
        exit 1
      fi

      echo "[$(date)] Restoring ${DB} from ${BACKUP_FILE}..."
      echo "[$(date)] WARNING: this will DROP and recreate the database!"
      read -p "Continue? [y/N] " confirm
      [ "${confirm}" = "y" ] || exit 0

      psql -U postgres -c "SELECT pg_terminate_backend(pid) FROM pg_stat_activity WHERE datname='${DB}';"
      psql -U postgres -c "DROP DATABASE IF EXISTS ${DB};"
      psql -U postgres -c "CREATE DATABASE ${DB} OWNER ${USER};"
      gunzip -c "${BACKUP_FILE}" | psql -U "${USER}" "${DB}"
      echo "[$(date)] Restore complete."

- name: Schedule daily backup via cron (2:00 AM)
  cron:
    name: "postgresql daily backup"
    user: postgres
    hour: "2"
    minute: "0"
    job: "/usr/local/bin/pg-backup.sh >> /var/log/pg-backup.log 2>&1"

- name: Schedule weekly log rotation for backup log
  cron:
    name: "rotate backup log"
    user: postgres
    weekday: "0"
    hour: "3"
    minute: "0"
    job: "cp /var/log/pg-backup.log /var/log/pg-backup.log.1 && truncate -s 0 /var/log/pg-backup.log"
