---
- name: Install Helm
  shell: curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
  args:
    creates: /usr/local/bin/helm

- name: Add Nginx Ingress Helm repository
  shell: helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx && helm repo update
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

# Hetzner Cloud has no built-in LoadBalancer for k3s, so we run ingress as
# a DaemonSet on hostNetwork — every node listens on :80/:443 directly.
# Traffic from the Hetzner firewall lands on the node, then nginx routes it.
- name: Install Nginx Ingress Controller (hostNetwork DaemonSet)
  shell: |
    helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx \
      --namespace ingress-nginx \
      --create-namespace \
      --set controller.kind=DaemonSet \
      --set controller.hostNetwork=true \
      --set controller.dnsPolicy=ClusterFirstWithHostNet \
      --set controller.service.type=ClusterIP \
      --set controller.publishService.enabled=false \
      --wait --timeout 5m
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: Wait for ingress-nginx DaemonSet to be ready
  shell: |
    kubectl -n ingress-nginx rollout status daemonset/ingress-nginx-controller --timeout=120s
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
