---
- name: Установить k3s master
  shell: |
    curl -sfL https://get.k3s.io | INSTALL_K3S_VERSION="{{ k3s_version }}" sh -s - server \
      --disable traefik \
      --node-ip {{ ansible_host }} \
      --advertise-address {{ ansible_host }}
  args:
    creates: /usr/local/bin/k3s   # не запускать если уже установлен

- name: Дождаться готовности k3s
  wait_for:
    port: 6443
    delay: 10
    timeout: 120

- name: Получить join token
  slurp:
    src: /var/lib/rancher/k3s/server/node-token
  register: k3s_token_raw

- name: Сохранить token как fact (доступен другим play'ям)
  set_fact:
    k3s_join_token: "{{ k3s_token_raw.content | b64decode | trim }}"
    cacheable: yes

- name: Скопировать kubeconfig на мастер (для kubectl)
  copy:
    src: /etc/rancher/k3s/k3s.yaml
    dest: /root/.kube/config
    remote_src: yes
    mode: '0600'
