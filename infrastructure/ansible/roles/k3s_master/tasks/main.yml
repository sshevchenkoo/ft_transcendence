---
- name: Install k3s master
  shell: |
    curl -sfL https://get.k3s.io | INSTALL_K3S_VERSION="{{ k3s_version }}" sh -s - server \
      --disable traefik \
      --node-ip {{ ansible_host }} \
      --advertise-address {{ ansible_host }}
  args:
    creates: /usr/local/bin/k3s   # do not run if already installed

- name: Wait for k3s to be ready
  wait_for:
    port: 6443
    delay: 10
    timeout: 120

- name: Get the join token
  slurp:
    src: /var/lib/rancher/k3s/server/node-token
  register: k3s_token_raw

- name: Save the token as a fact (available to other plays)
  set_fact:
    k3s_join_token: "{{ k3s_token_raw.content | b64decode | trim }}"
    cacheable: yes

- name: Copy kubeconfig onto the master (for kubectl)
  copy:
    src: /etc/rancher/k3s/k3s.yaml
    dest: /root/.kube/config
    remote_src: yes
    mode: '0600'
