---
- name: Detect PostgreSQL version
  shell: pg_lsclusters -h | awk 'NR==1{print $1}'
  register: pg_version_raw
  changed_when: false

- name: Set pg_version fact
  set_fact:
    pg_version: "{{ pg_version_raw.stdout | trim }}"

- name: Create monitoring PostgreSQL user
  become_user: postgres
  postgresql_user:
    name: "{{ postgres_exporter_user }}"
    password: "{{ postgres_exporter_password }}"
    role_attr_flags: LOGIN
    state: present

- name: Grant pg_monitor role to monitoring user
  become_user: postgres
  postgresql_membership:
    group: pg_monitor
    target_user: "{{ postgres_exporter_user }}"
    state: present

- name: Allow monitoring user to connect from localhost
  lineinfile:
    path: "/etc/postgresql/{{ pg_version }}/main/pg_hba.conf"
    line: "host  {{ postgres_db }}  {{ postgres_exporter_user }}  127.0.0.1/32  scram-sha-256"
    state: present
  notify: restart postgresql

- name: Download postgres_exporter binary
  get_url:
    url: "https://github.com/prometheus-community/postgres_exporter/releases/download/v{{ postgres_exporter_version }}/postgres_exporter-{{ postgres_exporter_version }}.linux-amd64.tar.gz"
    dest: /tmp/postgres_exporter.tar.gz
    mode: "0644"

- name: Extract postgres_exporter
  unarchive:
    src: /tmp/postgres_exporter.tar.gz
    dest: /tmp/
    remote_src: yes

- name: Install postgres_exporter binary
  copy:
    src: "/tmp/postgres_exporter-{{ postgres_exporter_version }}.linux-amd64/postgres_exporter"
    dest: /usr/local/bin/postgres_exporter
    mode: "0755"
    remote_src: yes

- name: Create postgres_exporter systemd service
  copy:
    dest: /etc/systemd/system/postgres_exporter.service
    mode: "0644"
    content: |
      [Unit]
      Description=PostgreSQL Exporter
      After=network.target postgresql.service

      [Service]
      User=postgres
      Environment=DATA_SOURCE_NAME=postgresql://{{ postgres_exporter_user }}:{{ postgres_exporter_password }}@127.0.0.1:5432/{{ postgres_db }}?sslmode=disable
      ExecStart=/usr/local/bin/postgres_exporter \
        --web.listen-address={{ postgres_private_ip }}:9187 \
        --web.telemetry-path=/metrics
      Restart=on-failure

      [Install]
      WantedBy=multi-user.target
  no_log: true
  notify: restart postgres_exporter

- name: Enable and start postgres_exporter
  systemd:
    name: postgres_exporter
    state: started
    enabled: yes
    daemon_reload: yes
