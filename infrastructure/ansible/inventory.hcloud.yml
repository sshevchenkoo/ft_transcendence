# Ansible dynamic inventory — Hetzner Cloud plugin
#
# Install the plugin (once):
#   ansible-galaxy collection install hetzner.hcloud
#
# The token comes from the HCLOUD_TOKEN environment variable
# The Makefile exports it automatically from terraform.tfvars

plugin: hetzner.hcloud.hcloud

# FIX: take the token from env explicitly — without this the inventory is empty
token: "{{ lookup('env', 'HCLOUD_TOKEN') }}"

# Only take servers belonging to our project.
# IMPORTANT: the value "transcendence" must match project_name in terraform/variables.tf.
# The hcloud plugin does not support Jinja2 in label_selector — change it by hand when switching projects.
label_selector: "project=transcendence"

# Connect over the public IP
compose:
  ansible_host: public_ipv4

# Group by the role label (set by Terraform)
groups:
  k3s_master:  "'master'   in labels.role"
  k3s_workers: "'worker'   in labels.role"
  postgres:    "'postgres' in labels.role"
  elk:         "'elk'      in labels.role"
