[defaults]
inventory         = inventory.hcloud.yml
remote_user       = root
# FIX: ключ из папки проекта .ssh/ — устанавливается через ANSIBLE_PRIVATE_KEY_FILE в Makefile
# Makefile передаёт: ANSIBLE_PRIVATE_KEY_FILE=../../.ssh/id_ed25519
private_key_file  = ../../.ssh/id_ed25519
host_key_checking = False
stdout_callback   = yaml
gathering         = smart

[ssh_connection]
pipelining  = True
ssh_args    = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no
