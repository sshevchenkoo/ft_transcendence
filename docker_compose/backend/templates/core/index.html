<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ft_transcendence — infrastructure test</title>
  <style>
    body { font-family: monospace; max-width: 800px; margin: 40px auto; padding: 0 20px; background: #0d1117; color: #c9d1d9; }
    h1 { color: #58a6ff; }
    h2 { color: #8b949e; font-size: 14px; text-transform: uppercase; letter-spacing: 2px; margin-top: 40px; }
    .status-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 16px 0; }
    .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px; }
    .card .label { font-size: 12px; color: #8b949e; margin-bottom: 6px; }
    .card .value { font-size: 20px; font-weight: bold; }
    .ok { color: #3fb950; }
    .error { color: #f85149; }
    .pending { color: #d29922; }
    .chat-box { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px; height: 200px; overflow-y: auto; margin: 12px 0; font-size: 13px; }
    .chat-box .msg { padding: 4px 0; border-bottom: 1px solid #21262d; }
    .chat-box .system { color: #3fb950; }
    .chat-box .incoming { color: #58a6ff; }
    input[type=text] { background: #161b22; border: 1px solid #30363d; border-radius: 6px; color: #c9d1d9; padding: 8px 12px; width: calc(100% - 90px); font-family: monospace; }
    button { background: #238636; border: none; border-radius: 6px; color: white; padding: 8px 16px; cursor: pointer; font-family: monospace; margin-left: 8px; }
    button:hover { background: #2ea043; }
    .ws-status { font-size: 12px; margin-bottom: 8px; }
    pre { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px; overflow-x: auto; font-size: 12px; }
  </style>
</head>
<body>

<h1>ft_transcendence</h1>
<p style="color:#8b949e">Test backend for checking the infrastructure</p>

<h2>Service status</h2>
<div class="status-grid">
  <div class="card">
    <div class="label">Django</div>
    <div class="value ok" id="django-status">OK</div>
  </div>
  <div class="card">
    <div class="label">PostgreSQL</div>
    <div class="value pending" id="db-status">...</div>
  </div>
  <div class="card">
    <div class="label">Redis</div>
    <div class="value pending" id="redis-status">...</div>
  </div>
</div>

<h2>WebSocket (Django Channels + Redis)</h2>
<div class="ws-status">Status: <span id="ws-status" class="pending">connecting...</span></div>
<div class="chat-box" id="chat-box"></div>
<div>
  <input type="text" id="msg-input" placeholder="Type a message and press Enter..." />
  <button onclick="sendMsg()">Send</button>
</div>

<h2>REST API — DB check</h2>
<pre id="api-output">Loading...</pre>

<script>
  // --- Healthcheck ---
  fetch("/health/")
    .then(r => r.json())
    .then(data => {
      document.getElementById("db-status").textContent = data.db === "ok" ? "OK" : "ERR";
      document.getElementById("db-status").className = "value " + (data.db === "ok" ? "ok" : "error");
      document.getElementById("redis-status").textContent = data.redis === "ok" ? "OK" : "ERR";
      document.getElementById("redis-status").className = "value " + (data.redis === "ok" ? "ok" : "error");
    })
    .catch(() => {
      document.getElementById("db-status").textContent = "ERR";
      document.getElementById("db-status").className = "value error";
    });

  // --- REST API ---
  fetch("/api/messages/")
    .then(r => r.json())
    .then(data => {
      document.getElementById("api-output").textContent = JSON.stringify(data, null, 2);
    });

  // --- WebSocket ---
  const wsUrl = `ws://${window.location.host}/ws/chat/`;
  const ws = new WebSocket(wsUrl);
  const box = document.getElementById("chat-box");

  function addMsg(text, cls) {
    const div = document.createElement("div");
    div.className = "msg " + cls;
    div.textContent = text;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
  }

  ws.onopen = () => {
    document.getElementById("ws-status").textContent = "connected";
    document.getElementById("ws-status").className = "ok";
  };

  ws.onclose = () => {
    document.getElementById("ws-status").textContent = "disconnected";
    document.getElementById("ws-status").className = "error";
  };

  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    if (data.type === "system") addMsg(data.message, "system");
    else addMsg(data.message, "incoming");
  };

  function sendMsg() {
    const input = document.getElementById("msg-input");
    if (!input.value.trim()) return;
    ws.send(JSON.stringify({ message: input.value }));
    input.value = "";
  }

  document.getElementById("msg-input").addEventListener("keydown", e => {
    if (e.key === "Enter") sendMsg();
  });
</script>

</body>
</html>
