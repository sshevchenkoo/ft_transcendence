# Template for the warsaw-secrets Secret. DO NOT commit a filled-in copy.
# Apply the real one with kubectl (see docs/deployment.md), or copy this to
# secret.yml (gitignored), fill it, and `kubectl apply -f secret.yml`.
apiVersion: v1
kind: Secret
metadata:
  name: warsaw-secrets
  namespace: warsaw
type: Opaque
stringData:
  POSTGRES_USER: app
  POSTGRES_PASSWORD: change-me
  POSTGRES_DB: events
  DATABASE_URL: postgresql+psycopg://app:change-me@postgres:5432/events
  ANTHROPIC_API_KEY: sk-ant-...
  VOYAGE_API_KEY: pa-...
  APIFY_TOKEN: apify_api_...
  TICKETMASTER_API_KEY: "..."   # Consumer Key from developer.ticketmaster.com
  GOOGLE_CLIENT_ID: "..."          # OAuth 2.0 Web client (console.cloud.google.com)
  GOOGLE_CLIENT_SECRET: "..."
  SESSION_SECRET: "..."            # long random string; signs the session cookie
