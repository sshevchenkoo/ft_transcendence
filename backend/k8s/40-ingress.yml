# Single domain for the whole app: the frontend at /, and the API at its known
# paths (/search, /health). Same origin, so the browser uses relative API calls
# and no CORS is needed in production. nginx matches the most specific prefix,
# so /search and /health go to the API and everything else to the web frontend.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: warsaw
  namespace: warsaw
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # SSE: disable response buffering and allow a long-lived stream so the
    # /search events reach the client as they are produced.
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - ${WARSAW_DOMAIN}
      secretName: warsaw-tls
  rules:
    - host: ${WARSAW_DOMAIN}
      http:
        paths:
          - path: /search
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8000
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 3000
